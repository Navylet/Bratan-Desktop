name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        arch: [x64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: npx playwright install --with-deps

      - name: Build application
        run: npx electron-builder --${{ matrix.os == 'windows-latest' && 'win' || 'linux' }} --publish never

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-desktop-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/**

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: 'Automated release by workflow'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download artifacts and upload to release
        uses: actions/download-artifact@v4
        with:
          name: openclaw-desktop-ubuntu-latest-x64
          path: artifacts-linux

      - name: Upload Linux artifacts
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts-linux/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download windows artifacts and upload
        uses: actions/download-artifact@v4
        with:
          name: openclaw-desktop-windows-latest-x64
          path: artifacts-windows

      - name: Upload Windows artifacts
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts-windows/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
