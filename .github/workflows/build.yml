name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for release (optional, e.g., v1.0.0)'
        required: false
        default: ''

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-

      - name: Debug info
        run: |
          node --version
          npm --version
          npx electron-builder --version

      - name: Install npm dependencies
        run: npm ci

      - name: Build Windows
        run: npm run dist:win-builder

      - name: Prepare artifacts directory
        run: |
          New-Item -ItemType Directory -Force -Path artifacts-windows
          Get-ChildItem dist -Filter "*.exe" -Recurse | Copy-Item -Destination artifacts-windows

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: artifacts-windows/

  release:
    runs-on: ubuntu-latest
    needs: [build-windows]
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '')
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts

      - name: Prepare release artifacts
        run: |
          mkdir -p release
          mv windows-artifacts/* release/ 2>/dev/null || true

      - name: Create checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          generate_release_notes: true
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
